<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ملاعب حائل | دخول الموظف</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <nav class="main-nav" aria-label="القائمة الرئيسية">
        <a href="index.html#about">عن الأمانة والمدينة الذكية</a>
        <a href="booking.html">حجز الملاعب</a>
        <a href="login.html">الدخول عبر توكلنا</a>
        <a href="employee-login.html">دخول الموظف</a>
      </nav>
      <a href="index.html" class="brand">
        <img src="img/hail-municipality-logo.png" alt="شعار أمانة منطقة حائل" class="brand-logo">
        <span class="brand-name">ملاعب حائل</span>
      </a>
    </div>
  </header>

  <main>
    <section class="section login-section">
      <div class="container">
        <div class="login-wrapper">
          <h1 class="page-title">دخول الموظف</h1>
          <p class="page-intro">ادخل إلى لوحة التحكم لإدارة الحجوزات والحدائق.</p>
          <p id="emp-login-message" class="form-message" hidden></p>
          <form id="employee-login-form" class="form-card login-card" novalidate>
            <div class="form-group">
              <label for="username">اسم المستخدم</label>
              <input type="text" id="username" name="username" required placeholder="employee" autocomplete="username">
            </div>
            <div class="form-group">
              <label for="password">كلمة المرور</label>
              <input type="password" id="password" name="password" required placeholder="••••" autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-block">دخول لوحة التحكم</button>
            <p class="form-hint">للتجربة: المستخدم <strong>employee</strong> / كلمة المرور <strong>1234</strong></p>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>منصة ملاعب حائل – لحجز وإدارة المرافق الرياضية البلدية</p>
    </div>
  </footer>
  <script src="js/script.js"></script>
</body>
</html>
