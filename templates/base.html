<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ملاعب حائل{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <!-- الهيدر -->
  <header class="site-header">
    <div class="container header-inner">
      <!-- القائمة أولاً في DOM حتى يظهر الشعار في الزاوية اليسرى مع RTL -->
      <nav class="main-nav" aria-label="القائمة الرئيسية">
        <a href="{{ url_for('home') }}#about">عن الأمانة والمدينة الذكية</a>
        <a href="{{ url_for('booking') }}">حجز الملاعب</a>
        <a href="{{ url_for('login') }}">الدخول عبر توكلنا</a>
        {% if session.get('employee_logged_in') %}
        <a href="{{ url_for('dashboard') }}">لوحة التحكم</a>
        {% else %}
        <a href="{{ url_for('employee_login') }}">دخول الموظف</a>
        {% endif %}
      </nav>

      <a href="{{ url_for('home') }}" class="brand">
        <img
          src="{{ url_for('static', filename='img/hail-municipality-logo.png') }}"
          alt="شعار أمانة منطقة حائل"
          class="brand-logo"
        >
        <span class="brand-name">ملاعب حائل</span>
      </a>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- الفوتر -->
  <footer class="site-footer">
    <div class="container">
      <p>منصة ملاعب حائل – لحجز وإدارة المرافق الرياضية البلدية</p>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
